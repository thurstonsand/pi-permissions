name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish-npm:
    name: Publish npm package
    needs: ci
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Inspect publish environment
        run: |
          echo "node=$(node --version)"
          echo "npm=$(npm --version)"
          echo "registry=$(npm config get registry)"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" && echo "oidc_request_url=present" || echo "oidc_request_url=missing"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" && echo "oidc_request_token=present" || echo "oidc_request_token=missing"

      - name: Publish to npm
        run: npm publish --access public --tag latest
